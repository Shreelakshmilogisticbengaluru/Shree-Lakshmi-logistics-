<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREE LAKSHMI LOGISTIC PVT LTD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <!-- HEADER -->
    <header class="bg-blue-900 text-white p-4 fixed top-0 w-full z-40 flex justify-between">
        <button onclick="openMenu()" class="bg-blue-800 px-4 py-2 rounded">☰ Menu</button>
        <button onclick="openAdmin()" class="bg-yellow-600 px-4 py-2 rounded">🔐 Admin</button>
    </header>

    <!-- MENU -->
    <div id="menu" class="fixed inset-0 bg-black/50 z-50 hidden" onclick="closeMenu()">
        <div class="bg-blue-900 w-80 h-full p-6" onclick="event.stopPropagation()">
            <button onclick="closeMenu()" class="text-white text-2xl float-right">&times;</button>
            <h3 class="text-white font-bold mb-6 mt-8">Navigation</h3>
            <button onclick="showHome()" class="block w-full text-left text-white py-3 px-4 hover:bg-blue-700 rounded mb-2">🏠 Home</button>
            <button onclick="alert('Services Page')" class="block w-full text-left text-white py-3 px-4 hover:bg-blue-700 rounded mb-2">🚚 Services</button>
            <button onclick="alert('Contact: 7665296227')" class="block w-full text-left text-white py-3 px-4 hover:bg-blue-700 rounded mb-2">📞 Contact</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="mt-20 p-4 max-w-4xl mx-auto">
        
        <!-- HOME PAGE -->
        <div id="homePage">
            <h1 class="text-3xl font-bold text-blue-900 text-center mb-6">SHREE LAKSHMI LOGISTIC PVT LTD</h1>
            
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-bold mb-4">📍 Track Your Order</h2>
                <input type="text" id="trackInput" placeholder="Enter LR Number (Try: LR123456)" class="w-full px-4 py-3 border rounded-lg mb-3">
                <button onclick="trackOrder()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Track Now</button>
                <p id="trackError" class="text-red-500 text-sm mt-2"></p>
            </div>

            <div id="result" class="bg-white p-6 rounded-lg shadow-lg mt-6 hidden">
                <h3 class="font-bold text-lg mb-4">Tracking Result</h3>
                <div id="resultData"></div>
            </div>
        </div>

        <!-- ADMIN LOGIN -->
        <div id="adminPage" class="hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg max-w-md mx-auto">
                <h3 class="text-2xl font-bold mb-6">🔐 Admin Login</h3>
                <input type="text" id="adminUser" placeholder="Username" class="w-full px-4 py-3 border rounded-lg mb-3">
                <input type="password" id="adminPass" placeholder="Password" class="w-full px-4 py-3 border rounded-lg mb-3">
                <button onclick="loginAdmin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Login</button>
                <p id="loginError" class="text-red-500 text-sm mt-2"></p>
                <p class="text-xs text-gray-500 mt-4">Use: admin / lakshmi2026</p>
                <button onclick="showHome()" class="w-full bg-gray-300 text-gray-800 font-bold py-2 rounded-lg mt-4">← Back</button>
            </div>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="dashboardPage" class="hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold">📊 Admin Dashboard</h3>
                    <button onclick="logoutAdmin()" class="bg-red-600 text-white px-4 py-2 rounded-lg">Logout</button>
                </div>
                
                <div class="bg-blue-50 p-4 rounded-lg mb-6">
                    <h4 class="font-bold mb-4">➕ Add Shipment</h4>
                    <input type="text" id="newLR" placeholder="LR Number" class="w-full px-3 py-2 border rounded mb-2">
                    <input type="text" id="newFrom" placeholder="From City" class="w-full px-3 py-2 border rounded mb-2">
                    <input type="text" id="newTo" placeholder="To City" class="w-full px-3 py-2 border rounded mb-2">
                    <select id="newStatus" class="w-full px-3 py-2 border rounded mb-2">
                        <option>Booked</option>
                        <option>In Transit</option>
                        <option>Delivered</option>
                    </select>
                    <button onclick="addOrder()" class="w-full bg-green-600 text-white font-bold py-2 rounded">Add Order</button>
                </div>

                <h4 class="font-bold mb-4">📦 All Orders</h4>
                <div id="ordersList"></div>
            </div>
        </div>

    </main>

    <script>
        // DATA
        let orders = JSON.parse(localStorage.getItem('orders') || '[{"lr":"LR123456","from":"Hyderabad","to":"Bengaluru","status":"In Transit"}]');
        let isLoggedIn = false;

        // MENU FUNCTIONS
        function openMenu() {
            document.getElementById('menu').classList.remove('hidden');
        }
        function closeMenu() {
            document.getElementById('menu').classList.add('hidden');
        }

        // PAGE FUNCTIONS
        function showHome() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.add('hidden');
            closeMenu();
        }

        function openAdmin() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('adminPage').classList.remove('hidden');
            document.getElementById('dashboardPage').classList.add('hidden');
        }

        // TRACKING FUNCTION
        function trackOrder() {
            const input = document.getElementById('trackInput').value.trim().toUpperCase();
            const error = document.getElementById('trackError');
            const result = document.getElementById('result');
            const resultData = document.getElementById('resultData');
            
            error.textContent = '';
            result.classList.add('hidden');
            
            if (!input) {
                error.textContent = 'Please enter LR number!';
                return;
            }
            
            const order = orders.find(o => o.lr === input);
            
            if (!order) {
                error.textContent = 'Order not found!';
                return;
            }
            
            resultData.innerHTML = `
                <p><strong>LR No:</strong> ${order.lr}</p>
                <p><strong>Route:</strong> ${order.from} → ${order.to}</p>
                <p><strong>Status:</strong> <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">${order.status}</span></p>
            `;
            result.classList.remove('hidden');
        }

        // ADMIN FUNCTIONS
        function loginAdmin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const error = document.getElementById('loginError');
            
            if (user === 'admin' && pass === 'lakshmi2026') {
                isLoggedIn = true;
                document.getElementById('adminPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                loadOrders();
                error.textContent = '';
            } else {
                error.textContent = 'Wrong username or password!';
            }
        }

        function logoutAdmin() {
            isLoggedIn = false;
            showHome();
        }

        function addOrder() {
            const lr = document.getElementById('newLR').value;
            const from = document.getElementById('newFrom').value;
            const to = document.getElementById('newTo').value;
            const status = document.getElementById('newStatus').value;
            
            if (!lr || !from || !to) {
                alert('Please fill all fields!');
                return;
            }
            
            orders.push({lr, from, to, status});
            localStorage.setItem('orders', JSON.stringify(orders));
            
            document.getElementById('newLR').value = '';
            document.getElementById('newFrom').value = '';
            document.getElementById('newTo').value = '';
            
            loadOrders();
            alert('Order added successfully!');
        }

        function loadOrders() {
            const list = document.getElementById('ordersList');
            list.innerHTML = orders.map((o, i) => `
                <div class="border p-3 rounded mb-2 flex justify-between items-center">
                    <div>
                        <strong>${o.lr}</strong><br>
                        <span class="text-sm text-gray-600">${o.from} → ${o.to}</span><br>
                        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">${o.status}</span>
                    </div>
                    <button onclick="deleteOrder(${i})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
                </div>
            `).join('');
        }

        function deleteOrder(index) {
            if (confirm('Delete this order?')) {
                orders.splice(index, 1);
                localStorage.setItem('orders', JSON.stringify(orders));
                loadOrders();
            }
        }

        // Initialize
        showHome();
    </script>
</body>
</html>
